<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laptop Doctor - Chat History</title>
    <!-- Font Awesome icons (blue accent) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ----- CSS variables with BLUE accent (matching main theme) ----- */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f8;
            --sidebar-bg: #202123;
            --sidebar-text: #ececf1;
            --border-light: #e5e5e5;
            --bot-msg-bg: #ffffff;
            --text-primary: #2d2d2d;
            --text-secondary: #6b6b6b;
            --accent: #0066ff;
            --accent-hover: #0052cc;
            --accent-light: #4d94ff;
            --input-bg: #ffffff;
            --shadow: 0 2px 6px rgba(0,102,255,0.1);
            --card-bg: #ffffff;
            --scroll-thumb: #c1c1c1;
            --scroll-track: #ececf1;
        }

        body.dark {
            --bg-primary: #343541;
            --bg-secondary: #444654;
            --sidebar-bg: #202123;
            --sidebar-text: #ececf1;
            --border-light: #4d4d4f;
            --bot-msg-bg: #444654;
            --text-primary: #ececf1;
            --text-secondary: #b0b0b0;
            --accent: #4d94ff;
            --accent-hover: #0066ff;
            --accent-light: #99bbff;
            --input-bg: #40414f;
            --shadow: 0 2px 6px rgba(77,148,255,0.2);
            --card-bg: #40414f;
            --scroll-thumb: #5d5d67;
            --scroll-track: #2d2d35;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-secondary);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            transition: background 0.2s ease;
            color: var(--text-primary);
        }

        /* history page container */
        .history-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* header with navigation */
        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .history-header h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .history-header h2 i {
            color: var(--accent);
            font-size: 2rem;
        }

        .nav-links {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 40px;
            background: rgba(0,102,255,0.05);
            border: 1px solid var(--border-light);
            transition: all 0.2s;
        }

        .nav-links a:hover {
            background: rgba(0,102,255,0.1);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .nav-links a i {
            color: var(--accent);
            font-size: 1rem;
        }

        /* theme toggle in corner */
        .theme-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,102,255,0.3);
            transition: all 0.2s;
            z-index: 100;
            border: none;
        }

        .theme-toggle:hover {
            background: var(--accent-hover);
            transform: scale(1.1);
        }

        .theme-toggle i {
            font-size: 1.3rem;
        }

        /* chat history cards */
        .chat-history-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 32px;
        }

        .chat-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            transition: all 0.2s;
            animation: cardAppear 0.3s ease;
        }

        .chat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,102,255,0.15);
            border-color: var(--accent-light);
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-pair {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .user-message, .bot-message {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .message-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .user-message .message-icon {
            background: var(--accent);
            color: white;
        }

        .bot-message .message-icon {
            background: rgba(0,102,255,0.1);
            color: var(--accent);
        }

        .message-content {
            flex: 1;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .user-message .message-content {
            background: var(--accent);
            color: white;
            border-bottom-left-radius: 4px;
        }

        .bot-message .message-content {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            border-bottom-right-radius: 4px;
        }

        .chat-timestamp {
            margin-top: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            border-top: 1px solid var(--border-light);
            padding-top: 12px;
        }

        .chat-timestamp i {
            color: var(--accent);
            font-size: 0.7rem;
        }

        hr {
            display: none; /* Hide original hr, we use cards instead */
        }

        .empty-history {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border-light);
            margin-top: 32px;
        }

        .empty-history i {
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-history p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .empty-history a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 40px;
            transition: background 0.2s;
        }

        .empty-history a:hover {
            background: var(--accent-hover);
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scroll-track);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-hover);
        }

        /* mobile */
        @media (max-width: 600px) {
            .history-container {
                padding: 20px 16px;
            }

            .history-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .nav-links {
                width: 100%;
                justify-content: space-between;
            }

            .chat-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- theme toggle button (same as main app) -->
    <div class="theme-toggle" id="themeToggle" title="Toggle theme">
        <i class="fas fa-sun" id="themeIcon"></i>
    </div>

    <div class="history-container">
        <div class="history-header">
            <h2>
                <i class="fas fa-history" style="color: var(--accent);"></i>
                Your Chat History
            </h2>
            <div class="nav-links">
                <a href="/chat">
                    <i class="fas fa-arrow-left"></i>
                    Back
                </a>
                <a href="/logout">
                    <i class="fas fa-sign-out-alt"></i>
                    Sign Out
                </a>
            </div>
        </div>

        <!-- decorative line with blue accent -->
        <div style="height: 2px; background: linear-gradient(90deg, var(--accent) 0%, transparent 100%); margin: 8px 0 24px 0;"></div>

        <!-- chat history loop -->
        <div class="chat-history-list">
            {% if chats %}
                {% for chat in chats %}
                <div class="chat-card">
                    <div class="message-pair">
                        <div class="user-message">
                            <div class="message-icon">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="message-content">
                                {{ chat.user }}
                            </div>
                        </div>
                        <div class="bot-message">
                            <div class="message-icon">
                                <i class="fas fa-robot"></i>
                            </div>
                            <div class="message-content">
                                {{ chat.bot }}
                            </div>
                        </div>
                    </div>
                    <div class="chat-timestamp">
                        <i class="fas fa-clock"></i>
                        <!-- if you have timestamp field, use it here -->
                        <span>{% if chat.timestamp %}{{ chat.timestamp }}{% else %}Recent conversation{% endif %}</span>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <div class="empty-history">
                    <i class="fas fa-history"></i>
                    <p>No chat history yet</p>
                    <a href="/chat">Start a conversation</a>
                </div>
            {% endif %}
        </div>
    </div>

    <script>
        // Theme toggle (same as main app)
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;

        // Check saved theme
        const savedTheme = localStorage.getItem('laptopDoctorTheme');
        if (savedTheme === 'dark') {
            body.classList.add('dark');
            themeIcon.className = 'fas fa-moon';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');

            if (isDark) {
                themeIcon.className = 'fas fa-moon';
                localStorage.setItem('laptopDoctorTheme', 'dark');
            } else {
                themeIcon.className = 'fas fa-sun';
                localStorage.setItem('laptopDoctorTheme', 'light');
            }
        });

        // Add animation delay for cards
        document.querySelectorAll('.chat-card').forEach((card, index) => {
            card.style.animationDelay = `${index * 0.05}s`;
        });
    </script>
</body>
</html>
