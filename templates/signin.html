<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laptop Doctor - Sign In</title>
    <!-- Font Awesome icons (blue accent) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ----- CSS variables with BLUE accent (matching main theme) ----- */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f8;
            --sidebar-bg: #202123;
            --sidebar-text: #ececf1;
            --border-light: #e5e5e5;
            --text-primary: #2d2d2d;
            --text-secondary: #6b6b6b;
            --accent: #0066ff;
            --accent-hover: #0052cc;
            --accent-light: #4d94ff;
            --input-bg: #ffffff;
            --shadow: 0 2px 6px rgba(0,102,255,0.1);
            --card-bg: #ffffff;
            --error-bg: #ffebee;
            --error-text: #c62828;
        }

        body.dark {
            --bg-primary: #343541;
            --bg-secondary: #444654;
            --sidebar-bg: #202123;
            --sidebar-text: #ececf1;
            --border-light: #4d4d4f;
            --text-primary: #ececf1;
            --text-secondary: #b0b0b0;
            --accent: #4d94ff;
            --accent-hover: #0066ff;
            --accent-light: #99bbff;
            --input-bg: #40414f;
            --shadow: 0 2px 6px rgba(77,148,255,0.2);
            --card-bg: #40414f;
            --error-bg: #4a2c2c;
            --error-text: #ff8a80;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-secondary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            transition: background 0.2s ease;
            color: var(--text-primary);
        }

        /* signin container */
        .signin-container {
            width: 100%;
            max-width: 440px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* main card */
        .signin-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,102,255,0.15);
            border: 1px solid var(--border-light);
            transition: all 0.2s;
        }

        .signin-card:hover {
            box-shadow: 0 15px 50px rgba(0,102,255,0.25);
        }

        /* header with icon */
        .signin-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .signin-header i {
            font-size: 3.5rem;
            color: var(--accent);
            background: rgba(0,102,255,0.1);
            padding: 20px;
            border-radius: 50%;
            margin-bottom: 16px;
        }

        .signin-header h2 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .signin-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .signin-header p i {
            font-size: 0.8rem;
            padding: 0;
            background: none;
            color: var(--accent);
            margin: 0;
        }

        /* error message */
        .error-message {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            border-left: 4px solid #f44336;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-message i {
            font-size: 1.2rem;
            color: #f44336;
        }

        /* form */
        .signin-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            margin-left: 8px;
        }

        .form-group label i {
            color: var(--accent);
            margin-right: 6px;
            font-size: 0.85rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: var(--accent);
            font-size: 1rem;
            opacity: 0.7;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 2px solid var(--border-light);
            border-radius: 20px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0,102,255,0.1);
        }

        .input-wrapper input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* remember me and forgot password row */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
            padding: 0 4px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .forgot-password {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            padding: 4px 8px;
            border-radius: 20px;
        }

        .forgot-password:hover {
            background: rgba(0,102,255,0.1);
            gap: 6px;
        }

        .forgot-password i {
            font-size: 0.8rem;
        }

        /* submit button */
        .submit-btn {
            margin-top: 16px;
            padding: 18px;
            border: none;
            border-radius: 30px;
            background: var(--accent);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,102,255,0.3);
        }

        .submit-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,102,255,0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn i {
            font-size: 1.1rem;
        }

        /* signup link */
        .signup-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-light);
        }

        .signup-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 40px;
            transition: all 0.2s;
        }

        .signup-link a:hover {
            background: rgba(0,102,255,0.1);
            gap: 12px;
        }

        .signup-link a i {
            font-size: 0.9rem;
        }

        /* theme toggle (floating button) */
        .theme-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,102,255,0.3);
            transition: all 0.2s;
            z-index: 100;
            border: none;
        }

        .theme-toggle:hover {
            background: var(--accent-hover);
            transform: scale(1.1) rotate(15deg);
        }

        .theme-toggle i {
            font-size: 1.3rem;
        }

        /* mobile */
        @media (max-width: 480px) {
            .signin-card {
                padding: 24px;
            }

            .signin-header h2 {
                font-size: 1.6rem;
            }

            .signin-header i {
                font-size: 2.5rem;
                padding: 15px;
            }

            .form-options {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- theme toggle button -->
    <div class="theme-toggle" id="themeToggle" title="Toggle theme">
        <i class="fas fa-sun" id="themeIcon"></i>
    </div>

    <div class="signin-container">
        <div class="signin-card">
            <div class="signin-header">
                <i class="fas fa-stethoscope"></i>
                <h2>Welcome Back</h2>
                <p><i class="fas fa-robot"></i> Sign in to Laptop Doctor AI</p>
            </div>

            <!-- error message if any -->
            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                {{ error }}
            </div>
            {% endif %}

            <!-- signin form -->
            <form method="POST" class="signin-form">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" name="email" placeholder="bhanuvamsi@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key input-icon"></i>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <!-- remember me and forgot password -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <i class="fas fa-check-circle" style="color: var(--accent);"></i>
                        Remember me
                    </label>
                    <a href="/forgot-password" class="forgot-password">
                        <i class="fas fa-question-circle"></i>
                        Forgot Password?
                    </a>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In
                </button>
            </form>

            <div class="signup-link">
                <a href="/signup">
                    <i class="fas fa-user-plus"></i>
                    Don't have an account? Create one
                </a>
            </div>
        </div>
    </div>

    <script>
        // Theme toggle (same as main app)
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;

        // Check saved theme
        const savedTheme = localStorage.getItem('laptopDoctorTheme');
        if (savedTheme === 'dark') {
            body.classList.add('dark');
            themeIcon.className = 'fas fa-moon';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');

            if (isDark) {
                themeIcon.className = 'fas fa-moon';
                localStorage.setItem('laptopDoctorTheme', 'dark');
            } else {
                themeIcon.className = 'fas fa-sun';
                localStorage.setItem('laptopDoctorTheme', 'light');
            }
        });

        // Optional: Add loading state on form submit
        const form = document.querySelector('.signin-form');
        const submitBtn = document.querySelector('.submit-btn');

        if (form) {
            form.addEventListener('submit', function() {
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
                submitBtn.disabled = true;
            });
        }
    </script>
</body>
</html>
